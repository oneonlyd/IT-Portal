<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Portal - Masuk</title>
    <!-- Tailwind CSS versi modern via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons via CDN untuk visual ikon profesional -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Portal Features: Shared CSS -->
    <link rel="stylesheet" href="portal-features.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        @keyframes zoom-in-out {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        .bg-zoom {
            animation: zoom-in-out 30s ease-in-out infinite;
            will-change: transform;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transform: translateZ(0);
        }
        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in-up {
            animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0; /* Fallback for initial state before animation runs */
        }
    </style>
</head>
<body data-no-connection-indicator="true" class="bg-slate-900 text-slate-800 min-h-screen flex flex-col justify-between antialiased relative overflow-x-hidden">

    <!-- Page Transition Overlay -->
    <div id="page-transition-overlay" class="page-transition-overlay"></div>

    <!-- Background Image dengan Kecerahan 30% dan Page Effect Zoom -->
    <div class="fixed inset-0 -z-10 w-full h-full overflow-hidden">
        <div class="w-full h-full bg-cover bg-center bg-zoom" style="background-image: url('sandvik_bg.jpg'); filter: brightness(0.3);"></div>
    </div>

    <!-- Toggle Toolbar (Dark Mode & Language) di Kanan Atas -->
    <div class="fixed top-6 right-6 z-50 flex gap-3 animate-fade-in-up" style="animation-delay: 0.18s;">
        <!-- Tombol Bilingual -->
        <button onclick="toggleLanguage()" class="h-10 px-4 flex items-center gap-2 bg-white rounded-full text-xs font-bold text-slate-800 shadow-md hover:bg-slate-50 border border-slate-100 transition-all cursor-pointer" title="Toggle Language">
            <i data-lucide="globe" class="w-4 h-4 text-red-500"></i>
            <span id="lang-label" class="tracking-wide">ID</span>
        </button>
        <!-- Tombol Dark Mode -->
        <button onclick="toggleDarkMode()" class="w-10 h-10 flex items-center justify-center bg-white rounded-2xl text-slate-800 shadow-md hover:bg-slate-50 border border-slate-100 transition-all cursor-pointer" title="Toggle Dark Mode">
            <i data-lucide="moon" id="dark-mode-icon" class="w-4.5 h-4.5 text-slate-700"></i>
        </button>
    </div>

    <!-- Container Utama untuk Menengahkan Form -->
    <div class="flex-1 flex flex-col justify-center items-center px-4 py-12">
        <div class="w-full max-w-md">
            
            <!-- LOGO & BRAND PORTAL DI ATAS FORM -->
            <div class="text-center mb-8 animate-fade-in-up" style="animation-delay: 0.1s;">
                <!-- Ikon Komputer Laptop tema merah tua (red-800) -->
                <div class="inline-flex items-center justify-center bg-red-800 text-white p-3 rounded-2xl shadow-md mb-4 ring-4 ring-red-800/30">
                    <i data-lucide="laptop" class="w-8 h-8"></i>
                </div>
                <h1 class="text-3xl font-extrabold text-white tracking-tight drop-shadow-md" data-i18n="login.title">IT PORTAL</h1>
                <p class="text-sm text-slate-200 mt-1 drop-shadow-sm" data-i18n="login.tagline">Satu Pintu Layanan Tim IT PT. Sandvik SMC</p>
            </div>

            <!-- KARTU FORM LOGIN (Warna Putih Bersih) dengan Animasi Masuk -->
            <div class="login-card bg-white rounded-2xl shadow-xl border border-slate-100 p-8 animate-fade-in-up" style="animation-delay: 0.25s;">
                <div class="mb-6">
                    <h2 class="text-xl font-bold text-slate-800" data-i18n="login.heading">Masuk ke Portal</h2>
                    <p class="text-xs text-slate-400 mt-1" data-i18n="login.subtitle">Gunakan akun admin atau kredensial IT Anda</p>
                </div>

                <!-- Bagian Error Alert (Disembunyikan secara default) -->
                <div id="error-alert" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 text-xs px-3 py-2.5 rounded-lg flex items-center gap-2">
                    <i data-lucide="shield-alert" class="w-4 h-4 flex-shrink-0"></i>
                    <span id="error-text" data-i18n="login.error">Kredensial yang Anda masukkan salah.</span>
                </div>

                <!-- Form login -->
                <form id="login-form" onsubmit="handleLogin(event)" class="space-y-5">
                    <!-- Field Username -->
                    <div>
                        <label for="username" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2" data-i18n="login.username">Username</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                                <i data-lucide="user" class="h-4 w-4"></i>
                            </span>
                            <input 
                                type="text" 
                                id="username" 
                                placeholder="" 
                                class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-red-800 focus:bg-white focus:ring-2 focus:ring-red-800/10 transition-all"
                                required
                            >
                        </div>
                    </div>

                    <!-- Field Password -->
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label for="password" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider" data-i18n="login.password">Password</label>
                            <a href="#" onclick="showForgotMessage(event)" class="text-xs text-red-800 hover:underline" data-i18n="login.forgot">Lupa password?</a>
                        </div>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                                <i data-lucide="lock" class="h-4 w-4"></i>
                            </span>
                            <input 
                                type="password" 
                                id="password" 
                                placeholder="••••••••" 
                                class="w-full pl-10 pr-10 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-red-800 focus:bg-white focus:ring-2 focus:ring-red-800/10 transition-all"
                                required
                            >
                            <button 
                                type="button" 
                                id="toggle-password" 
                                class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 hover:text-slate-600 focus:outline-none"
                            >
                                <i data-lucide="eye" id="eye-icon" class="h-4 w-4"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Ingat Perangkat -->
                    <div class="flex items-center">
                        <input id="remember" type="checkbox" checked class="h-4 w-4 text-red-800 focus:ring-red-500 border-slate-300 rounded cursor-pointer">
                        <label htmlFor="remember" class="ml-2 block text-xs text-slate-500 cursor-pointer select-none" data-i18n="login.remember">Ingat perangkat ini</label>
                    </div>

                    <!-- Tombol Masuk (Warna merah tua) -->
                    <button 
                        type="submit" 
                        class="w-full py-3 px-4 bg-red-800 hover:bg-red-900 text-white rounded-xl text-sm font-semibold shadow-lg shadow-red-800/15 hover:shadow-red-800/20 active:scale-[0.99] transition-all cursor-pointer"
                        data-i18n="login.submit"
                    >
                        Masuk Portal
                    </button>
                </form>
            </div>

            <!-- Catatan Keamanan -->
            <div class="text-center mt-8 text-xs text-white/70 drop-shadow-sm">
                <p data-i18n="login.copyright">© 2026 IT Internship - Devina Setya Maharani</p>
            </div>

        </div>
    </div>



    <!-- Portal Features: Shared JS -->
    <script src="portal-features.js"></script>

    <!-- JAVASCRIPT API INTEGRATION -->
    <script>
        // Inisialisasi ikon Lucide
        lucide.createIcons();

        // Toggle Password Visibility
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('toggle-password');
        const eyeIcon = document.getElementById('eye-icon');

        if (togglePasswordBtn) {
            togglePasswordBtn.addEventListener('click', () => {
                const isPassword = passwordInput.getAttribute('type') === 'password';
                passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
                eyeIcon.setAttribute('data-lucide', isPassword ? 'eye-off' : 'eye');
                lucide.createIcons();
            });
        }

        // Handler login form riil terhubung ke api/login.php
        function handleLogin(event) {
            event.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const errorAlert = document.getElementById('error-alert');
            const errorText = document.getElementById('error-text');

            // Sembunyikan alert error sebelumnya
            errorAlert.classList.add('hidden');

            // Kirim request POST ke backend api/login.php
            fetch('api/login.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: user,
                    password: pass
                })
            })
            .then(async (response) => {
                const data = await response.json();
                if (!response.ok) {
                    // Jika HTTP status bukan 2xx, lempar error dengan pesan dari server
                    throw new Error(data.message || 'Terjadi kesalahan saat login.');
                }
                return data;
            })
            .then(data => {
                // Simpan nama lengkap dan role di localStorage untuk ditampilkan di UI dashboard
                localStorage.setItem('currentUser', data.data.nama_lengkap);
                localStorage.setItem('currentUserRole', data.data.role);
                
                // Alihkan halaman ke dashboard dengan transisi
                navigateTo('dashboard.html');
            })
            .catch(error => {
                // Tampilkan pesan error dari server ke Alert UI
                errorText.innerText = error.message;
                errorAlert.classList.remove('hidden');
            });
        }

        // Tampilkan notifikasi lupa password
        function showForgotMessage(event) {
            event.preventDefault();
            alert('Untuk melakukan reset password, silakan hubungi tim Administrator Jaringan Senior melalui email atau datang langsung ke ruang IT Helpdesk.');
        }
    </script>
</body>
</html>
