<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Portal - Masuk</title>
    <!-- Tailwind CSS versi modern via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons via CDN untuk visual ikon profesional -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col justify-between antialiased">

    <!-- Container Utama untuk Menengahkan Form -->
    <div class="flex-1 flex flex-col justify-center items-center px-4 py-12">
        <div class="w-full max-w-md">
            
            <!-- LOGO & BRAND PORTAL DI ATAS FORM -->
            <div class="text-center mb-8">
                <!-- Ikon Komputer Laptop tema merah tua (red-800) -->
                <div class="inline-flex items-center justify-center bg-red-800 text-white p-3 rounded-2xl shadow-md mb-4 ring-4 ring-red-100">
                    <i data-lucide="laptop" class="w-8 h-8"></i>
                </div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">IT PORTAL</h1>
                <p class="text-sm text-slate-500 mt-1">Satu Pintu Layanan Tim IT PT. Sandvik SMC</p>
            </div>

            <!-- KARTU FORM LOGIN (Warna Putih Bersih) -->
            <div class="bg-white rounded-2xl shadow-xl border border-slate-100 p-8">
                <div class="mb-6">
                    <h2 class="text-xl font-bold text-slate-800">Masuk ke Portal</h2>
                    <p class="text-xs text-slate-400 mt-1">Gunakan akun admin atau kredensial IT Anda</p>
                </div>

                <!-- Bagian Error Alert (Disembunyikan secara default) -->
                <div id="error-alert" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 text-xs px-3 py-2.5 rounded-lg flex items-center gap-2">
                    <i data-lucide="shield-alert" class="w-4 h-4 flex-shrink-0"></i>
                    <span id="error-text">Kredensial yang Anda masukkan salah.</span>
                </div>

                <!-- Form login -->
                <form id="login-form" onsubmit="handleLogin(event)" class="space-y-5">
                    <!-- Field Username -->
                    <div>
                        <label for="username" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Username</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                                <i data-lucide="user" class="h-4 w-4"></i>
                            </span>
                            <input 
                                type="text" 
                                id="username" 
                                placeholder="" 
                                class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-red-800 focus:bg-white focus:ring-2 focus:ring-red-800/10 transition-all"
                                required
                            >
                        </div>
                    </div>

                    <!-- Field Password -->
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label for="password" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider">Password</label>
                            <a href="#" onclick="showForgotMessage(event)" class="text-xs text-red-800 hover:underline">Lupa password?</a>
                        </div>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                                <i data-lucide="lock" class="h-4 w-4"></i>
                            </span>
                            <input 
                                type="password" 
                                id="password" 
                                placeholder="••••••••" 
                                class="w-full pl-10 pr-10 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-red-800 focus:bg-white focus:ring-2 focus:ring-red-800/10 transition-all"
                                required
                            >
                            <button 
                                type="button" 
                                id="toggle-password" 
                                class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 hover:text-slate-600 focus:outline-none"
                            >
                                <i data-lucide="eye" id="eye-icon" class="h-4 w-4"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Ingat Perangkat -->
                    <div class="flex items-center">
                        <input id="remember" type="checkbox" checked class="h-4 w-4 text-red-800 focus:ring-red-500 border-slate-300 rounded cursor-pointer">
                        <label htmlFor="remember" class="ml-2 block text-xs text-slate-500 cursor-pointer select-none">Ingat perangkat ini</label>
                    </div>

                    <!-- Tombol Masuk (Warna merah tua) -->
                    <button 
                        type="submit" 
                        class="w-full py-3 px-4 bg-red-800 hover:bg-red-900 text-white rounded-xl text-sm font-semibold shadow-lg shadow-red-800/15 hover:shadow-red-800/20 active:scale-[0.99] transition-all cursor-pointer"
                    >
                        Masuk Portal
                    </button>
                </form>
            </div>

            <!-- Catatan Keamanan -->
            <div class="text-center mt-8 text-xs text-slate-400">
                <p>© 2026 IT Internship - Devina Setya Maharani</p>
            </div>

        </div>
    </div>



    <!-- JAVASCRIPT API INTEGRATION -->
    <script>
        // Inisialisasi ikon Lucide
        lucide.createIcons();

        // Toggle Password Visibility
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('toggle-password');
        const eyeIcon = document.getElementById('eye-icon');

        if (togglePasswordBtn) {
            togglePasswordBtn.addEventListener('click', () => {
                const isPassword = passwordInput.getAttribute('type') === 'password';
                passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
                eyeIcon.setAttribute('data-lucide', isPassword ? 'eye-off' : 'eye');
                lucide.createIcons();
            });
        }

        // Handler login form riil terhubung ke api/login.php
        function handleLogin(event) {
            event.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const errorAlert = document.getElementById('error-alert');
            const errorText = document.getElementById('error-text');

            // Sembunyikan alert error sebelumnya
            errorAlert.classList.add('hidden');

            // Kirim request POST ke backend api/login.php
            fetch('api/login.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: user,
                    password: pass
                })
            })
            .then(async (response) => {
                const data = await response.json();
                if (!response.ok) {
                    // Jika HTTP status bukan 2xx, lempar error dengan pesan dari server
                    throw new Error(data.message || 'Terjadi kesalahan saat login.');
                }
                return data;
            })
            .then(data => {
                // Simpan nama lengkap dan role di localStorage untuk ditampilkan di UI dashboard
                localStorage.setItem('currentUser', data.data.nama_lengkap);
                localStorage.setItem('currentUserRole', data.data.role);
                
                // Alihkan halaman ke dashboard
                window.location.href = 'dashboard.html';
            })
            .catch(error => {
                // Tampilkan pesan error dari server ke Alert UI
                errorText.innerText = error.message;
                errorAlert.classList.remove('hidden');
            });
        }

        // Tampilkan notifikasi lupa password
        function showForgotMessage(event) {
            event.preventDefault();
            alert('Untuk melakukan reset password, silakan hubungi tim Administrator Jaringan Senior melalui email atau datang langsung ke ruang IT Helpdesk.');
        }
    </script>
</body>
</html>
